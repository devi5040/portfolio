name: CI
on:
  push:
      branches:
        - "master"
  pull_request:
      branches:
        - "master"
jobs:
  ci:
    name: Lint, Format check and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Eslint
        run: npx eslint .
      - name: Check prettier formatting
        run: npx prettier --check .
      - name: Build
        run: npm run build
  